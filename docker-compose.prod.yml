services:
  hr-db:
    image: postgres:16-alpine
    container_name: hr_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hr_system}
      POSTGRES_USER: ${POSTGRES_USER:-hr_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - hr_postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5302:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hr_user} -d ${POSTGRES_DB:-hr_system}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  hr-backend:
    build:
      context: ./backend
    container_name: hr_backend
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-hr_user}:${POSTGRES_PASSWORD}@hr-db:5432/${POSTGRES_DB:-hr_system}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://www.4mstrategy.com,https://4mstrategy.com}
      DEMO_MODE: ${DEMO_MODE:-false}
    ports:
      - "127.0.0.1:5301:8000"
    depends_on:
      hr-db:
        condition: service_healthy
    restart: always

  hr-frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/hr-api/api}
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-/hr}
    container_name: hr_frontend
    ports:
      - "127.0.0.1:5300:3000"
    depends_on:
      - hr-backend
    restart: always

volumes:
  hr_postgres_data:
